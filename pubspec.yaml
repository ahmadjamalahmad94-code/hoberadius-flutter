name: hoberadius_app
description: HobeRadius admin UI — Flutter client targeting Web, Android, iOS, Windows.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # state + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # networking
  dio: ^5.4.3+1

  # storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # ui
  google_fonts: ^6.2.1
  intl: ^0.20.2
  fl_chart: ^0.68.0

  # csv export
  csv: ^6.0.0
  file_saver: ^0.2.13

  # card-renderer SVG + QR (Phase B of the Windows parity plan)
  # ---------------------------------------------------------------
  # flutter_svg is a pure-Dart plugin (no native code), so it is
  # safe to pull in for every platform — mobile pays a small bundle
  # cost (~70 KB) but does not need a guard.
  # qr (low-level QR matrix) is a small pure-Dart lib used by the
  # SVG adapter to walk the dark-module grid exactly the way the
  # web's `QrCodeWidget.qr.modules` does.
  flutter_svg: ^2.0.10
  qr: ^3.0.2

  # Windows-only extras — pulled in across all platforms because
  # pubspec.yaml does not support per-platform dependencies. The
  # IMPORT sites (lib/core/platform/*.dart) guard every usage
  # behind `Platform.isWindows`, and the mobile entry point never
  # reaches those imports. See docs/MOBILE_BASELINE.md for the
  # contract enforced by tests/parity/.
  #   - printing: PDF preview + system print dialog
  #   - desktop_drop: drag-and-drop background image on the
  #     bg-image picker
  #   - file_picker: existing dep, kept for completeness
  printing: ^5.13.0
  desktop_drop: ^0.4.4
  file_picker: ^8.0.0+1

  # Native DESKTOP toasts (Windows/macOS/Linux) — raised when a NEW
  # notification arrives. Desktop-only by design; every call site is guarded
  # by PlatformCapabilities.isDesktop so mobile behaviour is unchanged.
  local_notifier: ^0.1.6

  # ── Firebase Cloud Messaging (push) — DROP-IN, intentionally COMMENTED ──
  # Mobile foreground push also needs flutter_local_notifications (commented
  # here, used only by fcm_push_service.dart.txt). See docs/PUSH_FCM_SETUP.md.
  # flutter_local_notifications: ^18.0.1
  # Push is fully scaffolded (see lib/features/notifications/push/), but the
  # firebase_core Windows implementation FetchContent-downloads the Firebase
  # C++ SDK at build time, which would change the Windows build footprint
  # before any keys exist. To keep BOTH the mobile and Windows builds byte-
  # for-byte unchanged until the owner is ready, the deps stay commented.
  # To ENABLE push (see docs/PUSH_FCM_SETUP.md): uncomment the two lines
  # below, run `flutter pub get`, drop in google-services.json /
  # GoogleService-Info.plist, then follow the doc (rename the provided
  # fcm_push_service.dart.txt → .dart and flip pushServiceProvider).
  # firebase_core: ^3.6.0
  # firebase_messaging: ^15.1.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Almarai (Google Fonts, OFL) — same file the web admin embeds in
  # PDF exports. Bundled here so the designer canvas previews Arabic
  # in a font visually identical to the exported PDF.
  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai-Regular.ttf
        - asset: assets/fonts/Almarai-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/OFL.txt
